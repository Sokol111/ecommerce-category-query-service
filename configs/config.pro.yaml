# =============================================================================
# Category Query Service - Production Configuration
# =============================================================================
# Values can be overridden by environment variables.
# Viper automatically maps: mongo.host -> MONGO_HOST, kafka.brokers -> KAFKA_BROKERS, etc.

mongo:
  host: ""
  port: ""
  username: ""
  password: ""
  database: category-query
  replica-set: ""

security:
  token:
    public-key: ""

kafka:
  brokers: ""
  schema-registry:
    url: ""
    auto-register-schemas: true
  consumers-config:
    default-group-id: "ecommerce-category-query-service"
    default-auto-offset-reset: "earliest"
    consumers:
      - name: "category-events"
        topic: "catalog.category.events"
        max-retries: 5
        initial-backoff: 2s
        max-backoff: 30s
        enable-dlq: true
      - name: "attribute-events"
        topic: "catalog.attribute.events"
        max-retries: 5
        initial-backoff: 2s
        max-backoff: 30s
        enable-dlq: true

observability:
  otel-collector-endpoint: ""
  tracing:
    enabled: true
  metrics:
    enabled: true