logger:
  level: "debug"
  development: true

server:
  port: 8080

mongo:
  host: "localhost"
  port: 27017
  replica-set: rs0
  #  username: "root"
  #  password: "password"
  database: "category-query"

kafka:
  brokers: "localhost:9092"
  schema-registry:
    url: "http://localhost:8084"
    auto-register-schemas: true
  consumers-config:
    default-group-id: "ecommerce-category-query-service"
    default-auto-offset-reset: "earliest"
    consumers:
      - name: "category-events"
        topic: "catalog.category.events"
      - name: "attribute-events"
        topic: "catalog.attribute.events"

security:
  token:
    jwks-url: "http://localhost:8080/oauth/v2/keys"

clients:
  tenant-client:
    base-url: "http://localhost:8084"

observability:
  otel-collector-endpoint: ""
  tracing:
    enabled: true
  metrics:
    enabled: false